<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المكتبة الحية الكونية | Cosmic Living Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Kufi+Arabic:wght@400;600;700&family=Readex+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/cosmic.css" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div class="cosmic-bg"></div>
  <div class="cosmic-rays"></div>
  <div class="cosmic-silhouette" aria-hidden="true"></div>

  <header class="site-header glass-panel">
    <nav class="nav-inner">
      <a href="index.html" class="logo glow-text">المكتبة الحية الكونية</a>
      <a href="admin/" class="btn-cosmic btn-sm">لوحة الإدارة</a>
    </nav>
  </header>

  <main>
    <section class="hero" id="hero">
      <h1 class="hero-title glow-text">المكتبة الحية الكونية</h1>
      <p class="hero-subtitle">حيث يذوب الواقع في الفضاء، والكتب تحلق في جاذبية الصفر. استكشف المجموعة.</p>
      <a href="#library" class="btn-cosmic btn-glow">ادخل المكتبة</a>

      <div class="hero-floating-books" id="heroBooks" aria-hidden="true"></div>
    </section>

    <section class="library-section" id="library">
      <h2 class="section-title reveal">المجموعة</h2>
      <div class="category-tabs reveal" id="categoryTabs"></div>
      <div class="shelf-container">
        <div class="books-grid" id="booksGrid"></div>
      </div>
      <div class="library-loading" id="libraryLoading">جاري التحميل...</div>
      <div class="library-empty" id="libraryEmpty" hidden>لا توجد كتب بعد.</div>
    </section>
  </main>

  <footer class="site-footer glass-panel">
    <p>المكتبة الحية الكونية — تجربة تفاعلية سينمائية</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js" type="module"></script>
  <script src="js/cosmic.js"></script>
  <script src="js/main.js" type="module"></script>
</body>
</html>
